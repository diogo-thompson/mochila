<!DOCTYPE html>
<html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@600&display=swap" rel="stylesheet">
        <title> Formulários </title>
    </head>

    <body>

        <main>
            
            <form>

                <H1> Insira seus dados </H1>

                <div class="inline">
                    <div class="campo">
                        <label>Insira seu nome</label>
                        <input type="text" name="primeiro-nome" id="primeiro-nome" required>
                    </div>
                

                    <div class="campo">
                        <label>Insira seu sobrenome</label>
                        <input type="text" name="segundo-nome" id="segundo-nome">
                    </div>
                </div>    

                <div class="campo">
                    <label>Insira seu email</label>
                    <input type="email" name="email" id="email" required>
                </div>

                <div class="inline">
                    <div class="campo">
                        <label>Insira seu telefone</label>
                        <input type="tel" name="telefone" id="telefone">
                    </div>

                    <div class="campo">
                        <label>Insira seu celular</label>
                        <input type="number" name="celular" id="celular" required>
                    </div>
                </div>

                <div class="campo">
                    <label> Qual a sua stack </label>
                    <select name="stack" id="stack" required>
                        <option selected disabled value=""> Selecione </option>
                        <option> Javascript </option>
                        <option> HTML </option>
                        <option> CSS </option>
                        <option> Node </option>
                    </select>
                </div>

                    <input type="submit" name="submit" id="submit">

            </form>
        </main>
        

    </body>
</html>
